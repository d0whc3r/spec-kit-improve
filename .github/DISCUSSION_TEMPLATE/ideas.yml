title: "[Idea] <short summary>"
labels: ["idea"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or Job to Be Done are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: Sketch the change. It does not need to be implementation-ready.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
