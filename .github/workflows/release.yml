name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate manifest
        run: pnpm run validate

      - name: Lint
        run: pnpm run lint

      - name: Lint content
        run: pnpm run lint:content

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          before=$(git rev-parse HEAD)
          pnpm run release
          after=$(git rev-parse HEAD)
          if [[ "$before" != "$after" ]]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add install instructions to release
        if: steps.release.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/release-install-notes.mjs

      - name: Publish wiki
        if: steps.release.outputs.published == 'true'
        uses: ./.github/actions/publish-wiki
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render and upload upstream catalog issue
        if: steps.release.outputs.published == 'true'
        uses: ./.github/actions/render-catalog-issue
